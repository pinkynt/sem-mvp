services:
  node:
    profiles: ["dev"]
    image: node:22-alpine
    container_name: sem-mvp-node
    working_dir: /app
    # Maps to host UID/GID 1000:1000 so files created in /app stay owned by you, not root.
    user: node
    # No env_file here: the repo (incl. .env) is bind-mounted, and `next dev` reads
    # .env itself with hot-reload. Injecting it via env_file would freeze values at
    # container creation and shadow Next's live reload.
    volumes:
      - .:/app
    ports:
      - "3000:3000"
      - "5173:5173"
    # Keep the container alive so you can exec in and run npm/npx on demand.
    command: ["npm", "run", "dev"]
    tty: true
    stdin_open: true
    depends_on:
      deps:
        condition: service_completed_successfully

  deps:
    profiles: ["dev"]
    image: node:22-alpine
    container_name: sem-mvp-deps
    working_dir: /app
    # Same UID/GID mapping so node_modules stays owned by you, not root.
    user: node
    volumes:
      - .:/app
    # Installs into the shared bind mount and exits. `node` waits for this to
    # finish successfully before starting the dev server.
    command: ["npm", "install"]

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_SEM_DEMO_API_KEY: ${NEXT_PUBLIC_SEM_DEMO_API_KEY:-}
    ports:
      - "3011:3011"
    environment:
      NODE_ENV: production
      PORT: 3011
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      MERCADOPAGO_APPLICATION_ID: ${MERCADOPAGO_APPLICATION_ID:-}
      MERCADOPAGO_USER_ID: ${MERCADOPAGO_USER_ID:-}
      MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_PUBLIC_KEY:-}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_STORE_EXTERNAL_ID: ${MERCADOPAGO_STORE_EXTERNAL_ID:-}
      MERCADOPAGO_POS_EXTERNAL_ID: ${MERCADOPAGO_POS_EXTERNAL_ID:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      MERCADOPAGO_PROVISIONING_KEY: ${MERCADOPAGO_PROVISIONING_KEY:-}
      SEM_DEMO_API_KEY: ${SEM_DEMO_API_KEY:-}
      SEM_DEMO_PERMIT_HOLDER_LEGAJO: ${SEM_DEMO_PERMIT_HOLDER_LEGAJO:-DEMO-001}
      NEXT_PUBLIC_SEM_DEMO_API_KEY: ${NEXT_PUBLIC_SEM_DEMO_API_KEY:-}
    restart: unless-stopped
