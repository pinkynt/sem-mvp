services:
  node:
    profiles: ["dev"]
    image: node:22-alpine
    container_name: sem-mvp-node
    working_dir: /app
    # Maps to host UID/GID 1000:1000 so files created in /app stay owned by you, not root.
    user: node
    # Load local env into the dev process too. Next reads .env files, but server-only
    # values must also be present in the container process for API routes.
    volumes:
      - .:/app
    ports:
      - "3000:3000"
      - "5173:5173"
    # Keep the container alive so you can exec in and run npm/npx on demand.
    command: ["sh", "-lc", "set -a; [ -f .env ] && . ./.env; [ -f .env.local ] && . ./.env.local; set +a; npm run dev"]
    tty: true
    stdin_open: true
    depends_on:
      deps:
        condition: service_completed_successfully

  deps:
    profiles: ["dev"]
    image: node:22-alpine
    container_name: sem-mvp-deps
    working_dir: /app
    # Same UID/GID mapping so node_modules stays owned by you, not root.
    user: node
    volumes:
      - .:/app
    # Installs into the shared bind mount and exits. `node` waits for this to
    # finish successfully before starting the dev server.
    command: ["npm", "install"]

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - "3011:3011"
    environment:
      NODE_ENV: production
      PORT: 3011
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      MERCADOPAGO_APPLICATION_ID: ${MERCADOPAGO_APPLICATION_ID:-}
      MERCADOPAGO_USER_ID: ${MERCADOPAGO_USER_ID:-}
      MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_PUBLIC_KEY:-}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_STORE_EXTERNAL_ID: ${MERCADOPAGO_STORE_EXTERNAL_ID:-}
      MERCADOPAGO_POS_EXTERNAL_ID: ${MERCADOPAGO_POS_EXTERNAL_ID:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      MERCADOPAGO_PROVISIONING_KEY: ${MERCADOPAGO_PROVISIONING_KEY:-}
      PERMIT_HOLDER_SESSION_SECRET: ${PERMIT_HOLDER_SESSION_SECRET:-}
    restart: unless-stopped
